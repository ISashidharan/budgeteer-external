<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AtlasIQ">
  <defs>
    <linearGradient id="tile" x1="64" y1="48" x2="448" y2="464" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366F1"/>
      <stop offset="0.55" stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="sheen" x1="80" y1="60" x2="300" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#tile)"/>
  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#sheen)"/>

  <!-- Compass rose: cardinal points in white, North tipped in brand cyan. -->
  <circle cx="256" cy="256" r="206" fill="none" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="6"/>
  <circle cx="256" cy="256" r="186" fill="none" stroke="#FFFFFF" stroke-opacity="0.2" stroke-width="2"/>

  <!-- Intercardinal star -->
  <path d="M362.1 149.9 L256 216 L256 256 Z" fill="#FFFFFF" fill-opacity="0.30"/>
  <path d="M362.1 149.9 L256 256 L296 256 Z" fill="#FFFFFF" fill-opacity="0.18"/>
  <path d="M362.1 362.1 L296 256 L256 256 Z" fill="#FFFFFF" fill-opacity="0.30"/>
  <path d="M362.1 362.1 L256 256 L256 296 Z" fill="#FFFFFF" fill-opacity="0.18"/>
  <path d="M149.9 362.1 L256 296 L256 256 Z" fill="#FFFFFF" fill-opacity="0.30"/>
  <path d="M149.9 362.1 L256 256 L216 256 Z" fill="#FFFFFF" fill-opacity="0.18"/>
  <path d="M149.9 149.9 L216 256 L256 256 Z" fill="#FFFFFF" fill-opacity="0.30"/>
  <path d="M149.9 149.9 L256 256 L256 216 Z" fill="#FFFFFF" fill-opacity="0.18"/>

  <!-- Cardinal star: East / South / West -->
  <path d="M452 256 L287.1 224.9 L256 256 Z" fill="#FFFFFF"/>
  <path d="M452 256 L256 256 L287.1 287.1 Z" fill="#FFFFFF" fill-opacity="0.6"/>
  <path d="M256 452 L256 256 L224.9 287.1 Z" fill="#FFFFFF"/>
  <path d="M256 452 L287.1 287.1 L256 256 Z" fill="#FFFFFF" fill-opacity="0.6"/>
  <path d="M60 256 L224.9 287.1 L256 256 Z" fill="#FFFFFF"/>
  <path d="M60 256 L256 256 L224.9 224.9 Z" fill="#FFFFFF" fill-opacity="0.6"/>

  <!-- North point — brand cyan -->
  <path d="M256 60 L256 256 L287.1 224.9 Z" fill="#67E8F9"/>
  <path d="M256 60 L224.9 224.9 L256 256 Z" fill="#22D3EE"/>

  <!-- Center jewel -->
  <circle cx="256" cy="256" r="26" fill="#FFFFFF"/>
  <circle cx="256" cy="256" r="10" fill="#22D3EE"/>
</svg>
